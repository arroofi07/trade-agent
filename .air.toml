# Air — hot reload untuk Go (https://github.com/air-verse/air)
root = "."
tmp_dir = "tmp"

[build]
  # Windows (CMD): wajib .exe agar bisa dijalankan. Di Linux/macOS nama main.exe tetap valid.
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ."
  delay = 300
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "mod", "sum"]
  kill_delay = "500ms"
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
